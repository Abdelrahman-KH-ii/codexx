{% load static %}
<!DOCTYPE html>
<html lang="{{ active_lang }}" class="lang-{{ active_lang }}" dir="{% if is_ar %}rtl{% else %}ltr{% endif %}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- Sync localStorage to Server Active Language -->
  <script>
    (function() {
      var lang = "{{ active_lang }}";
      localStorage.setItem('nexus_lang', lang);
    })();
  </script>

  <title>{% block title %}DevFlow.io{% endblock %} — AI Coding Education</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/variables.css' %}">
  <link rel="stylesheet" href="{% static 'css/stitch-components.css' %}">
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
  
  <style>
    /* Instant CSS Localization Display Rules */
    html.lang-ar .text-en { display: none !important; }
    html.lang-ar .text-ar { display: inline !important; }
    html.lang-en .text-ar { display: none !important; }
    html.lang-en .text-en { display: inline !important; }

    html.lang-ar .text-en-block { display: none !important; }
    html.lang-ar .text-ar-block { display: block !important; }
    html.lang-en .text-ar-block { display: none !important; }
    html.lang-en .text-en-block { display: block !important; }

    /* RTL specific layout overrides */
    html.lang-ar body {
      text-align: right;
    }
  </style>

  {% block extra_css %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
  {% block body %}{% endblock %}

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="{% static 'js/particles.js' %}"></script>
  <script src="{% static 'js/nebula.js' %}"></script>
  
  <!-- Global Language Switcher Script -->
  <script>
    window.setAppLanguage = function(lang) {
      localStorage.setItem('nexus_lang', lang);
      document.cookie = "nexus_lang=" + lang + "; path=/; max-age=31536000";
      window.location.reload();
    };

    // Sync button states on load
    document.addEventListener('DOMContentLoaded', function() {
      var lang = localStorage.getItem('nexus_lang') || 'ar';
      var btnAr = document.getElementById('lang-btn-ar');
      var btnEn = document.getElementById('lang-btn-en');
      if (btnAr && btnEn) {
        if (lang === 'ar') {
          btnAr.classList.add('active');
          btnEn.classList.remove('active');
        } else {
          btnEn.classList.add('active');
          btnAr.classList.remove('active');
        }
      }
    });
  </script>

  <script src="{% static 'js/main.js' %}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
